<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>匿名聊天</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="box">
  <div class="left" id="userList"></div>
  <div class="right">
    <div class="msgBox" id="msgBox"></div>
    <div class="inputBox">
      <div id="emoBtn">😊</div>
      <input id="input" placeholder="输入消息">
      <button onclick="send()">发送</button>
    </div>
    <div class="emoPanel" id="emoPanel"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
